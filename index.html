<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>德州撲克籌碼追蹤器</title>
  <style>
  :root{
  --bg: #f6f8fb;
  --panel: #ffffff;
  --panel-soft: #f1f4f9;
  --card: #ffffff;
  --card-border: #e4e8f0;

  --text: #1e293b;
  --muted: #64748b;

  --accent: #3b82f6;
  --accent-soft: #e0edff;

  --success: #10b981;
  --success-soft: #e7f9f2;

  --warning: #f59e0b;
  --warning-soft: #fff4df;

  --danger: #ef4444;
  --danger-soft: #ffe8e8;

  --shadow: 0 10px 25px rgba(0,0,0,.06);
  --shadow-soft: 0 6px 18px rgba(0,0,0,.05);

  --radius: 16px;
  --radius-sm: 12px;

  --ui-scale: 1.06;
}

*{ box-sizing:border-box; }

body{
  margin:0;
  font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Noto Sans TC", "Microsoft JhengHei", sans-serif;
  background: var(--bg);
  color: var(--text);
  padding: 30px 20px 50px;
  font-size: calc(16px * var(--ui-scale));
}

body > *{
  max-width: 1100px;
  margin-left:auto;
  margin-right:auto;
}

h1{
  margin-bottom:18px;
  font-size: calc(28px * var(--ui-scale));
  font-weight:700;
  letter-spacing:.5px;
}

/* 控制列 */
.controls{
  background: var(--panel);
  border:1px solid var(--card-border);
  border-radius: var(--radius);
  padding:16px;
  display:flex;
  flex-wrap:wrap;
  gap:12px;
  align-items:center;
  box-shadow: var(--shadow-soft);
  margin-bottom:18px;
}

.controls label{
  display:flex;
  align-items:center;
  gap:8px;
  font-size: calc(15px * var(--ui-scale));
  color: var(--muted);
}

/* 按鈕 */
button{
  font-size: calc(15px * var(--ui-scale));
  padding: 11px 16px;
  border-radius: 12px;
  border:1px solid var(--card-border);
  background: var(--panel-soft);
  cursor:pointer;
  transition: all .15s ease;
  font-weight:600;
  box-shadow: 0 3px 8px rgba(0,0,0,.05);
}

button:hover{
  transform: translateY(-1px);
  background:#e9eef7;
}

button:disabled{
  opacity:.5;
  cursor:not-allowed;
  transform:none;
}

/* 玩家區 */
.player-container{
  display:grid;
  grid-template-columns: repeat(12, 1fr);
  gap:16px;
}

.player{
  grid-column: span 6;
  background: var(--card);
  border:1px solid var(--card-border);
  border-radius: var(--radius);
  padding:16px;
  box-shadow: var(--shadow);
  position:relative;
  transition: all .15s ease;
}

.player:hover{
  transform: translateY(-3px);
}

.player.inactive{
  opacity:.65;
}

.player p{
  margin:8px 0;
  color: var(--muted);
}

.player p:last-child{
  font-weight:700;
  color: var(--text);
}

/* 玩家按鈕顏色區分 */
.player button:nth-of-type(1){
  background: var(--success-soft);
  border-color:#c6f3e4;
}
.player button:nth-of-type(2){
  background: var(--warning-soft);
  border-color:#ffe1a6;
}
.player button:nth-of-type(3){
  background:#eef2f8;
}

/* 移除按鈕 */
.remove-button{
  position:absolute;
  top:6px;          /* 更靠上 */
  right:6px;        /* 更靠右 */
  width:22px;       /* 更小 */
  height:22px;
  border-radius:50%;
  background: var(--danger-soft);
  border:1px solid #ffcaca;
  font-size:12px;   /* 叉叉字變小 */
  line-height:1;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:0;
  cursor:pointer;
}

.remove-button:hover{
  background:#ffd6d6;
}

/* 輸入框 */
input[type="number"],
input[type="text"]{
  font-size: calc(15px * var(--ui-scale));
  padding:10px 12px;
  border-radius: 10px;
  border:1px solid var(--card-border);
  background:white;
  outline:none;
  transition:.15s;
}

input:focus{
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-soft);
}

input[disabled]{
  background:#f1f5f9;
}

/* 總覽 */
.summary{
  background: var(--panel);
  border:1px solid var(--card-border);
  border-radius: var(--radius);
  padding:14px 16px;
  margin-top:16px;
  box-shadow: var(--shadow-soft);
  font-weight:600;
}

/* 回合表格 */
.round-summary{
  margin-top:20px;
  background: var(--panel);
  border:1px solid var(--card-border);
  border-radius: var(--radius);
  padding:16px;
  box-shadow: var(--shadow-soft);
}

.round-summary table{
  width:100%;
  border-collapse: collapse;
  margin-top:10px;
}

.round-summary th,
.round-summary td{
  padding:12px;
  border:1px solid var(--card-border);
  font-size: calc(15px * var(--ui-scale));
}

.round-summary th{
  background:#f3f6fb;
  font-weight:700;
}

.round-summary tr:nth-child(even){
  background:#fafcff;
}

#grandTotalProfit{
  display:inline-block;
  padding:4px 10px;
  border-radius:999px;
  background: var(--accent-soft);
  border:1px solid #cfe3ff;
}

/* 手機版 */
@media (max-width: 980px){
  .player{ grid-column: span 12; }
  button{ width:100%; }
  .controls{ flex-direction:column; align-items:stretch; }
}
  </style>
  <!-- 匯出 Excel 用的 SheetJS -->
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
</head>
<body>
  <h1>德州撲克 籌碼與盈虧計算</h1>

  <div class="controls">
    <button onclick="addPlayer()">新增玩家</button>
    <button onclick="saveRound()">儲存回合</button>
    <label>籌碼倍率：
      <input type="number" id="multiplierInput" value="100" onchange="updateMultiplier(this.value)" />
    </label>
    <!-- 全局單次買入籌碼設定 -->
    <label>單次買入籌碼：
      <input type="number" id="buyInAmountInput" value="20000" onchange="updateBuyInAmount(this.value)" />
    </label>
    <!-- 匯出 Excel 按鈕（只匯出玩家名稱＋總盈虧） -->
    <button onclick="exportExcel()">匯出總盈虧 Excel</button>
  </div>

  <div id="players" class="player-container"></div>

  <div class="summary">
    <p>總買入籌碼：<span id="totalBuyIn">0</span> | 總剩餘籌碼：<span id="totalRemaining">0</span></p>
  </div>

  <div class="round-summary">
    <h3>回合盈虧紀錄</h3>
    <table id="roundsTable">
      <thead>
        <tr>
          <th>玩家名稱</th>
          <th>回合盈虧</th>
          <th>總盈虧</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
    <p style="margin-top:10px;font-weight:bold;">
      全體總盈虧（歷史累計）：<span id="grandTotalProfit">+0</span>
    </p>
  </div>

  <div class="reset-button">
    <button onclick="clearStorage()">清除儲存資料</button>
  </div>

  <script>
    let players = JSON.parse(localStorage.getItem('players')) || [];
    let rounds = JSON.parse(localStorage.getItem('rounds')) || [];
    let multiplier = parseFloat(localStorage.getItem('multiplier')) || 100;
    // 全局單次買入籌碼
    let buyInAmount = parseInt(localStorage.getItem('buyInAmount')) || 20000;

    // 升級補丁：把舊資料補上 active 等欄位，避免出錯
    (function migrateStorage() {
      try {
        players = Array.isArray(players) ? players : [];
        rounds = Array.isArray(rounds) ? rounds : [];
        if (typeof multiplier !== 'number' || isNaN(multiplier)) multiplier = 100;
      } catch (e) {
        players = []; rounds = []; multiplier = 100;
      }
      let changed = false;
      players = players.map(p => {
        const np = Object.assign({
          name: '',
          buyIn: buyInAmount,
          tokens: 1,
          remainingInput: '',
          remaining: 0,
          profit: 0,
          roundProfits: [],
          active: true
        }, p);
        if (p.active === undefined) changed = true;
        if (!Array.isArray(np.roundProfits)) np.roundProfits = [];
        np.buyIn = Number(np.buyIn) || 0;
        np.tokens = Number(np.tokens) || 0;
        np.remaining = Number(np.remaining) || 0;
        np.profit = Number(np.profit) || 0;
        return np;
      });
      if (changed) localStorage.setItem('players', JSON.stringify(players));
    })();

    function updateMultiplier(value) {
      multiplier = parseFloat(value) || 100;
      localStorage.setItem('multiplier', multiplier);
      players.forEach((_, i) => updateProfit(i));
    }

    // 更新全局單次買入籌碼，並同步所有在場玩家
    function updateBuyInAmount(value) {
      buyInAmount = parseInt(value) || 0;
      localStorage.setItem('buyInAmount', buyInAmount);
      // 依照目前代幣數量同步在場玩家的 buyIn
      players.forEach((p, i) => {
        if (p.active) {
          p.buyIn = buyInAmount * (p.tokens || 0);
          updateProfit(i);
        }
      });
      saveToStorage();
      render();
    }

    function addPlayer() {
      const player = {
        name: '',
        buyIn: buyInAmount,
        tokens: 1,
        remainingInput: '',
        remaining: 0,
        profit: 0,
        roundProfits: [],
        active: true
      };
      players.push(player);
      saveToStorage();
      render();
    }

    function removePlayer(index) {
      players.splice(index, 1);
      saveToStorage();
      render();
    }

    function buyIn(index) {
      if (!players[index].active) return; // 退場者不可操作
      players[index].buyIn += buyInAmount;
      players[index].tokens += 1;
      updateProfit(index);
      saveToStorage();
      render();
    }

    function decreaseBuyIn(index) {
      if (!players[index].active) return; // 退場者不可操作
      if (players[index].buyIn >= buyInAmount && players[index].tokens > 0) {
        players[index].buyIn -= buyInAmount;
        players[index].tokens -= 1;
        updateProfit(index);
        saveToStorage();
        render();
      }
    }

    function updateRemaining(index, value) {
      if (!players[index].active) return; // 退場者不可輸入
      players[index].remainingInput = value;
      const numericValue = parseInt(value.replace(/[^\d]/g, '')) || 0;
      players[index].remaining = numericValue;
      updateProfit(index);
      saveToStorage();
    }

    function updateProfit(index) {
      const p = players[index];
      // 退場者當局一律 +0（以 0-0 計算）
      const remaining = p.active ? p.remaining : 0;
      const buyIn = p.active ? p.buyIn : 0;
      p.profit = (remaining - buyIn) / multiplier;

      updateSummary();
      const profitElement = document.getElementById(`profit-${index}`);
      if (profitElement) {
        profitElement.textContent = formatProfit(p.profit);
      }
    }

    function formatProfit(profit) {
      if (profit === 0) return '+0';
      return profit > 0 ? `+${Math.round(profit)}` : `${Math.round(profit)}`;
    }

    function updateName(index, value) {
      players[index].name = value;
      saveToStorage();
    }

    // 退場/復出切換
    function toggleActive(index) {
      const p = players[index];
      p.active = !p.active;
      if (!p.active) {
        // 標記退場：當局數據全部歸 0，之後每局記 +0
        p.buyIn = 0;
        p.tokens = 0;
        p.remainingInput = '';
        p.remaining = 0;
        p.profit = 0;
      } else {
        // 標記復出：給預設起始
        p.buyIn = buyInAmount;
        p.tokens = 1;
        p.remainingInput = '';
        p.remaining = 0;
        p.profit = 0;
      }
      saveToStorage();
      render();
      updateSummary();
    }

    function saveRound() {
      const roundData = players.map(player => {
        // 退場者此局固定記 0，總盈虧自然保持不變
        const roundProfit = player.active ? player.profit : 0;
        player.roundProfits.push(roundProfit);
        return {
          name: player.name,
          roundProfits: player.roundProfits,
          totalProfit: player.roundProfits.reduce((acc, profit) => acc + profit, 0)
        };
      });

      rounds.push(roundData);
      saveToStorage();
      resetCurrentRound();
      renderRoundSummary();
    }

    function resetCurrentRound() {
      players.forEach(player => {
        if (player.active) {
          player.buyIn = buyInAmount;
          player.tokens = 1;
        } else {
          // 退場者在新回合維持不參與（當局 +0）
          player.buyIn = 0;
          player.tokens = 0;
        }
        player.remainingInput = '';
        player.remaining = 0;
        player.profit = 0;
      });
      saveToStorage();
      render();
    }

    function clearStorage() {
      localStorage.clear();
      players = [];
      rounds = [];
      multiplier = 100;
      buyInAmount = 20000;
      document.getElementById('multiplierInput').value = multiplier;
      document.getElementById('buyInAmountInput').value = buyInAmount;
      addPlayer();
      render();
      renderRoundSummary();
      updateSummary();
    }

    function render() {
      document.getElementById('multiplierInput').value = multiplier;
      const buyInInput = document.getElementById('buyInAmountInput');
      if (buyInInput) buyInInput.value = buyInAmount;

      const container = document.getElementById('players');
      container.innerHTML = '';

      players.forEach((player, index) => {
        const div = document.createElement('div');
        div.className = 'player' + (player.active ? '' : ' inactive');

        const inputId = `input-${index}`;
        const profitId = `profit-${index}`;

        div.innerHTML = `
          <button class="remove-button" onclick="removePlayer(${index})">×</button>
          <p>
            <label>玩家名稱：</label>
            <input type="text" value="${player.name}" oninput="updateName(${index}, this.value)" placeholder="請輸入玩家名稱" />
            ${player.active ? '' : '<span class="tag">已退場</span>'}
          </p>
          <p>買入籌碼：${player.buyIn}</p>
          <p>代幣數量：${player.tokens}</p>
          <button onclick="buyIn(${index})" ${!player.active ? 'disabled' : ''}>買入 (${buyInAmount}籌碼 + 1代幣)</button>
          <button onclick="decreaseBuyIn(${index})" ${!player.active ? 'disabled' : ''}>減少 (${buyInAmount}籌碼 - 1代幣)</button>
          <button onclick="toggleActive(${index})">${player.active ? '標記退場' : '標記復出'}</button><br><br>
          <label>手動輸入剩餘籌碼：</label>
         <input
  id="${inputId}"
  type="text"
  inputmode="numeric"
  pattern="[0-9]*"
  autocomplete="off"
  value="${player.remainingInput}"
  oninput="updateRemaining(${index}, this.value)"
  ${!player.active ? 'disabled' : ''}
/>
          <p>盈虧：<span id="${profitId}">${formatProfit(player.profit)}</span></p>
        `;

        container.appendChild(div);
      });
    }

    function renderRoundSummary() {
      const tableBody = document.getElementById('roundsTable').getElementsByTagName('tbody')[0];
      tableBody.innerHTML = '';

      players.forEach(player => {
        const roundProfits = player.roundProfits.map(profit => formatProfit(profit)).join('');
        const totalProfit = Math.round(player.roundProfits.reduce((acc, profit) => acc + profit, 0));
        const row = tableBody.insertRow();
        row.innerHTML = `
          <td>${player.name}</td>
          <td>${roundProfits}</td>
          <td>${totalProfit}</td>
        `;
      });

      // 更新全體總盈虧
      updateGrandTotal();
    }

    // 計算全體總盈虧（歷史累計）
    function updateGrandTotal() {
      const grand = players.reduce((acc, p) => {
        const sumP = p.roundProfits.reduce((a, b) => a + b, 0);
        return acc + sumP;
      }, 0);
      const el = document.getElementById('grandTotalProfit');
      if (el) el.textContent = formatProfit(grand);
    }

    function updateSummary() {
      let totalBuyIn = 0;
      let totalRemaining = 0;

      players.forEach(player => {
        totalBuyIn += player.buyIn;
        totalRemaining += player.remaining;
      });

      document.getElementById('totalBuyIn').textContent = totalBuyIn;
      document.getElementById('totalRemaining').textContent = totalRemaining;
    }

    function saveToStorage() {
      localStorage.setItem('players', JSON.stringify(players));
      localStorage.setItem('rounds', JSON.stringify(rounds));
      localStorage.setItem('multiplier', multiplier);
      localStorage.setItem('buyInAmount', buyInAmount);
    }

    // 匯出 Excel：玩家名稱 + 歷史總盈虧
    function exportExcel() {
      if (typeof XLSX === 'undefined') {
        alert('XLSX 函式庫尚未載入，請檢查網路或 CDN。');
        return;
      }

      const headers = ["玩家名稱", "總盈虧"];

      const data = players.map(p => {
        const total = Math.round(
          p.roundProfits.reduce((a, b) => a + b, 0)
        );
        return [p.name || '', total];
      });

      const worksheetData = [headers, ...data];
      const worksheet = XLSX.utils.aoa_to_sheet(worksheetData);

      // 欄寬稍微調整好看一點
      worksheet['!cols'] = [
        { wch: 20 }, // 玩家名稱
        { wch: 10 }  // 總盈虧
      ];

      const workbook = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(workbook, worksheet, "總盈虧");

      XLSX.writeFile(workbook, "poker_total_profit.xlsx");
    }

    if (players.length === 0) addPlayer();
    render();
    renderRoundSummary();
    updateSummary();
  </script>
</body>
</html>
