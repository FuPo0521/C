<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>德州撲克籌碼追蹤器</title>
  <style>
  :root{
  --bg: #0b1220;
  --panel: rgba(255,255,255,.08);
  --panel-2: rgba(255,255,255,.10);
  --card: rgba(255,255,255,.10);
  --card-border: rgba(255,255,255,.14);
  --text: rgba(255,255,255,.92);
  --muted: rgba(255,255,255,.65);
  --muted-2: rgba(255,255,255,.45);

  --accent: #60a5fa;       /* blue */
  --accent-2: #34d399;     /* green */
  --danger: #fb7185;       /* rose */
  --warning: #fbbf24;      /* amber */

  --shadow: 0 12px 30px rgba(0,0,0,.35);
  --shadow-soft: 0 10px 25px rgba(0,0,0,.25);
  --radius: 16px;
  --radius-sm: 12px;
}

*{ box-sizing: border-box; }
html, body{ height: 100%; }
body{
  margin: 0;
  font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Arial, "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", sans-serif;
  color: var(--text);
  background:
    radial-gradient(1000px 500px at 10% 10%, rgba(96,165,250,.22), transparent 60%),
    radial-gradient(900px 500px at 90% 15%, rgba(52,211,153,.16), transparent 60%),
    radial-gradient(900px 700px at 50% 100%, rgba(251,191,36,.10), transparent 60%),
    linear-gradient(180deg, #070b14 0%, #0b1220 40%, #0b1220 100%);
  padding: 28px 18px 40px;
}

/* page width */
body > *{
  max-width: 1100px;
  margin-left: auto;
  margin-right: auto;
}

h1{
  margin: 6px auto 14px;
  font-size: clamp(22px, 2.4vw, 30px);
  letter-spacing: .2px;
  line-height: 1.2;
}

/* controls bar */
.controls{
  margin: 14px auto 18px;
  padding: 14px 14px;
  display: flex;
  flex-wrap: wrap;
  gap: 10px 12px;
  align-items: center;

  background: linear-gradient(180deg, rgba(255,255,255,.10), rgba(255,255,255,.06));
  border: 1px solid var(--card-border);
  border-radius: var(--radius);
  box-shadow: var(--shadow-soft);

  position: sticky;
  top: 12px;
  z-index: 20;
  backdrop-filter: blur(10px);
}

.controls label{
  display: inline-flex;
  align-items: center;
  gap: 8px;
  color: var(--muted);
  font-size: 14px;
}

/* inputs */
input[type="number"],
input[type="text"]{
  width: 170px;
  max-width: 100%;
  padding: 10px 12px;
  border-radius: 12px;
  border: 1px solid rgba(255,255,255,.18);
  background: rgba(10,14,25,.55);
  color: var(--text);
  outline: none;
  transition: border-color .15s ease, transform .05s ease, background .15s ease;
}

input[type="text"]{ width: 210px; }

input[type="number"]:focus,
input[type="text"]:focus{
  border-color: rgba(96,165,250,.7);
  background: rgba(10,14,25,.72);
}

input[disabled]{
  opacity: .55;
  cursor: not-allowed;
}

/* buttons */
button{
  appearance: none;
  border: 1px solid rgba(255,255,255,.16);
  background: rgba(255,255,255,.08);
  color: var(--text);
  padding: 10px 12px;
  border-radius: 12px;
  cursor: pointer;
  font-weight: 600;
  letter-spacing: .1px;
  transition: transform .06s ease, background .15s ease, border-color .15s ease, opacity .15s ease;
  box-shadow: 0 6px 18px rgba(0,0,0,.18);
}

button:hover{
  background: rgba(255,255,255,.12);
  border-color: rgba(255,255,255,.24);
  transform: translateY(-1px);
}

button:active{
  transform: translateY(0px);
  opacity: .95;
}

button:disabled{
  opacity: .45;
  cursor: not-allowed;
  transform: none;
}

/* primary-ish buttons in controls (first row feel) */
.controls > button{
  background: linear-gradient(180deg, rgba(96,165,250,.22), rgba(96,165,250,.10));
  border-color: rgba(96,165,250,.30);
}
.controls > button:hover{
  background: linear-gradient(180deg, rgba(96,165,250,.28), rgba(96,165,250,.12));
  border-color: rgba(96,165,250,.42);
}

/* player grid */
.player-container{
  display: grid;
  grid-template-columns: repeat(12, 1fr);
  gap: 12px;
  margin-top: 10px;
}

.player{
  grid-column: span 6;
  position: relative;
  border: 1px solid var(--card-border);
  padding: 14px 14px 12px;
  background: linear-gradient(180deg, rgba(255,255,255,.10), rgba(255,255,255,.06));
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  transition: opacity .2s ease, transform .15s ease, border-color .15s ease;
  overflow: hidden;
}

.player::before{
  content:"";
  position:absolute;
  inset:-2px;
  background:
    radial-gradient(600px 120px at 20% 0%, rgba(96,165,250,.18), transparent 60%),
    radial-gradient(600px 120px at 90% 0%, rgba(52,211,153,.12), transparent 60%);
  pointer-events:none;
  opacity:.85;
}

.player > *{ position: relative; }

.player:hover{
  transform: translateY(-2px);
  border-color: rgba(255,255,255,.22);
}

.player.inactive{
  opacity: .65;
  filter: saturate(.85);
}

.player p{
  margin: 8px 0;
  color: var(--muted);
}

.player p strong,
.player label{
  color: var(--muted);
}

.player .tag{
  display:inline-flex;
  align-items:center;
  gap:6px;
  margin-left:8px;
  padding:3px 10px;
  border: 1px solid rgba(251,113,133,.35);
  background: rgba(251,113,133,.10);
  border-radius: 999px;
  font-size: 12px;
  color: rgba(255,255,255,.86);
}

/* remove button */
.remove-button{
  position: absolute;
  top: 10px;
  right: 10px;
  background: rgba(251,113,133,.14);
  border: 1px solid rgba(251,113,133,.35);
  color: rgba(255,255,255,.92);
  border-radius: 999px;
  width: 34px;
  height: 34px;
  cursor: pointer;
  display: grid;
  place-items: center;
  font-size: 18px;
  line-height: 0;
  box-shadow: 0 8px 18px rgba(0,0,0,.25);
}
.remove-button:hover{
  background: rgba(251,113,133,.20);
  border-color: rgba(251,113,133,.48);
}

/* within player: action buttons */
.player button{
  margin-right: 8px;
  margin-top: 6px;
}

.player button:nth-of-type(1){ /* buy in */
  background: linear-gradient(180deg, rgba(52,211,153,.22), rgba(52,211,153,.10));
  border-color: rgba(52,211,153,.30);
}
.player button:nth-of-type(2){ /* decrease */
  background: linear-gradient(180deg, rgba(251,191,36,.22), rgba(251,191,36,.10));
  border-color: rgba(251,191,36,.30);
}
.player button:nth-of-type(3){ /* toggle active */
  background: linear-gradient(180deg, rgba(255,255,255,.12), rgba(255,255,255,.06));
}

.player input[type="text"]{
  width: min(260px, 100%);
}

/* profit highlight */
.player p:last-child{
  margin-top: 10px;
  font-weight: 700;
  color: rgba(255,255,255,.85);
}
.player p:last-child span{
  display: inline-block;
  margin-left: 6px;
  padding: 2px 10px;
  border-radius: 999px;
  border: 1px solid rgba(255,255,255,.16);
  background: rgba(0,0,0,.18);
}

/* summary panels */
.summary{
  margin-top: 14px;
  padding: 12px 14px;
  border-radius: var(--radius);
  border: 1px solid var(--card-border);
  background: rgba(255,255,255,.06);
  color: var(--muted);
  box-shadow: var(--shadow-soft);
}
.summary span{
  color: rgba(255,255,255,.92);
}

/* round summary table */
.round-summary{
  margin-top: 18px;
  padding: 14px 14px 10px;
  border-top: none;
  border-radius: var(--radius);
  border: 1px solid var(--card-border);
  background: rgba(255,255,255,.06);
  box-shadow: var(--shadow-soft);
}

.round-summary h3{
  margin: 4px 0 10px;
  font-size: 16px;
  color: rgba(255,255,255,.92);
}

.round-summary table{
  width: 100%;
  border-collapse: separate;
  border-spacing: 0;
  overflow: hidden;
  border-radius: 14px;
  border: 1px solid rgba(255,255,255,.14);
}

.round-summary th,
.round-summary td{
  padding: 12px 10px;
  text-align: center;
  border-bottom: 1px solid rgba(255,255,255,.10);
  border-right: 1px solid rgba(255,255,255,.08);
}

.round-summary tr:last-child td{ border-bottom: none; }
.round-summary th:last-child,
.round-summary td:last-child{ border-right: none; }

.round-summary thead th{
  background: rgba(255,255,255,.08);
  color: rgba(255,255,255,.85);
  font-weight: 700;
}

.round-summary tbody tr:nth-child(odd) td{
  background: rgba(255,255,255,.04);
}
.round-summary tbody tr:nth-child(even) td{
  background: rgba(255,255,255,.02);
}

#grandTotalProfit{
  display: inline-block;
  margin-left: 8px;
  padding: 4px 10px;
  border-radius: 999px;
  border: 1px solid rgba(96,165,250,.35);
  background: rgba(96,165,250,.10);
  color: rgba(255,255,255,.92);
}

/* reset area */
.reset-button{
  margin-top: 16px;
}
.reset-button button{
  background: rgba(255,255,255,.08);
}

/* responsive */
@media (max-width: 980px){
  .player{ grid-column: span 12; }
  .controls{
    position: static;
    backdrop-filter: none;
  }
  input[type="number"], input[type="text"]{ width: 100%; }
  .controls label{ width: 100%; justify-content: space-between; }
  .controls > button{ width: 100%; }
  </style>
  <!-- 匯出 Excel 用的 SheetJS -->
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
</head>
<body>
  <h1>德州撲克 籌碼與盈虧計算</h1>

  <div class="controls">
    <button onclick="addPlayer()">新增玩家</button>
    <button onclick="saveRound()">儲存回合</button>
    <label>籌碼倍率：
      <input type="number" id="multiplierInput" value="100" onchange="updateMultiplier(this.value)" />
    </label>
    <!-- 全局單次買入籌碼設定 -->
    <label>單次買入籌碼：
      <input type="number" id="buyInAmountInput" value="20000" onchange="updateBuyInAmount(this.value)" />
    </label>
    <!-- 匯出 Excel 按鈕（只匯出玩家名稱＋總盈虧） -->
    <button onclick="exportExcel()">匯出總盈虧 Excel</button>
  </div>

  <div id="players" class="player-container"></div>

  <div class="summary">
    <p>總買入籌碼：<span id="totalBuyIn">0</span> | 總剩餘籌碼：<span id="totalRemaining">0</span></p>
  </div>

  <div class="round-summary">
    <h3>回合盈虧紀錄</h3>
    <table id="roundsTable">
      <thead>
        <tr>
          <th>玩家名稱</th>
          <th>回合盈虧</th>
          <th>總盈虧</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
    <p style="margin-top:10px;font-weight:bold;">
      全體總盈虧（歷史累計）：<span id="grandTotalProfit">+0</span>
    </p>
  </div>

  <div class="reset-button">
    <button onclick="clearStorage()">清除儲存資料</button>
  </div>

  <script>
    let players = JSON.parse(localStorage.getItem('players')) || [];
    let rounds = JSON.parse(localStorage.getItem('rounds')) || [];
    let multiplier = parseFloat(localStorage.getItem('multiplier')) || 100;
    // 全局單次買入籌碼
    let buyInAmount = parseInt(localStorage.getItem('buyInAmount')) || 20000;

    // 升級補丁：把舊資料補上 active 等欄位，避免出錯
    (function migrateStorage() {
      try {
        players = Array.isArray(players) ? players : [];
        rounds = Array.isArray(rounds) ? rounds : [];
        if (typeof multiplier !== 'number' || isNaN(multiplier)) multiplier = 100;
      } catch (e) {
        players = []; rounds = []; multiplier = 100;
      }
      let changed = false;
      players = players.map(p => {
        const np = Object.assign({
          name: '',
          buyIn: buyInAmount,
          tokens: 1,
          remainingInput: '',
          remaining: 0,
          profit: 0,
          roundProfits: [],
          active: true
        }, p);
        if (p.active === undefined) changed = true;
        if (!Array.isArray(np.roundProfits)) np.roundProfits = [];
        np.buyIn = Number(np.buyIn) || 0;
        np.tokens = Number(np.tokens) || 0;
        np.remaining = Number(np.remaining) || 0;
        np.profit = Number(np.profit) || 0;
        return np;
      });
      if (changed) localStorage.setItem('players', JSON.stringify(players));
    })();

    function updateMultiplier(value) {
      multiplier = parseFloat(value) || 100;
      localStorage.setItem('multiplier', multiplier);
      players.forEach((_, i) => updateProfit(i));
    }

    // 更新全局單次買入籌碼，並同步所有在場玩家
    function updateBuyInAmount(value) {
      buyInAmount = parseInt(value) || 0;
      localStorage.setItem('buyInAmount', buyInAmount);
      // 依照目前代幣數量同步在場玩家的 buyIn
      players.forEach((p, i) => {
        if (p.active) {
          p.buyIn = buyInAmount * (p.tokens || 0);
          updateProfit(i);
        }
      });
      saveToStorage();
      render();
    }

    function addPlayer() {
      const player = {
        name: '',
        buyIn: buyInAmount,
        tokens: 1,
        remainingInput: '',
        remaining: 0,
        profit: 0,
        roundProfits: [],
        active: true
      };
      players.push(player);
      saveToStorage();
      render();
    }

    function removePlayer(index) {
      players.splice(index, 1);
      saveToStorage();
      render();
    }

    function buyIn(index) {
      if (!players[index].active) return; // 退場者不可操作
      players[index].buyIn += buyInAmount;
      players[index].tokens += 1;
      updateProfit(index);
      saveToStorage();
      render();
    }

    function decreaseBuyIn(index) {
      if (!players[index].active) return; // 退場者不可操作
      if (players[index].buyIn >= buyInAmount && players[index].tokens > 0) {
        players[index].buyIn -= buyInAmount;
        players[index].tokens -= 1;
        updateProfit(index);
        saveToStorage();
        render();
      }
    }

    function updateRemaining(index, value) {
      if (!players[index].active) return; // 退場者不可輸入
      players[index].remainingInput = value;
      const numericValue = parseInt(value.replace(/[^\d]/g, '')) || 0;
      players[index].remaining = numericValue;
      updateProfit(index);
      saveToStorage();
    }

    function updateProfit(index) {
      const p = players[index];
      // 退場者當局一律 +0（以 0-0 計算）
      const remaining = p.active ? p.remaining : 0;
      const buyIn = p.active ? p.buyIn : 0;
      p.profit = (remaining - buyIn) / multiplier;

      updateSummary();
      const profitElement = document.getElementById(`profit-${index}`);
      if (profitElement) {
        profitElement.textContent = formatProfit(p.profit);
      }
    }

    function formatProfit(profit) {
      if (profit === 0) return '+0';
      return profit > 0 ? `+${Math.round(profit)}` : `${Math.round(profit)}`;
    }

    function updateName(index, value) {
      players[index].name = value;
      saveToStorage();
    }

    // 退場/復出切換
    function toggleActive(index) {
      const p = players[index];
      p.active = !p.active;
      if (!p.active) {
        // 標記退場：當局數據全部歸 0，之後每局記 +0
        p.buyIn = 0;
        p.tokens = 0;
        p.remainingInput = '';
        p.remaining = 0;
        p.profit = 0;
      } else {
        // 標記復出：給預設起始
        p.buyIn = buyInAmount;
        p.tokens = 1;
        p.remainingInput = '';
        p.remaining = 0;
        p.profit = 0;
      }
      saveToStorage();
      render();
      updateSummary();
    }

    function saveRound() {
      const roundData = players.map(player => {
        // 退場者此局固定記 0，總盈虧自然保持不變
        const roundProfit = player.active ? player.profit : 0;
        player.roundProfits.push(roundProfit);
        return {
          name: player.name,
          roundProfits: player.roundProfits,
          totalProfit: player.roundProfits.reduce((acc, profit) => acc + profit, 0)
        };
      });

      rounds.push(roundData);
      saveToStorage();
      resetCurrentRound();
      renderRoundSummary();
    }

    function resetCurrentRound() {
      players.forEach(player => {
        if (player.active) {
          player.buyIn = buyInAmount;
          player.tokens = 1;
        } else {
          // 退場者在新回合維持不參與（當局 +0）
          player.buyIn = 0;
          player.tokens = 0;
        }
        player.remainingInput = '';
        player.remaining = 0;
        player.profit = 0;
      });
      saveToStorage();
      render();
    }

    function clearStorage() {
      localStorage.clear();
      players = [];
      rounds = [];
      multiplier = 100;
      buyInAmount = 20000;
      document.getElementById('multiplierInput').value = multiplier;
      document.getElementById('buyInAmountInput').value = buyInAmount;
      addPlayer();
      render();
      renderRoundSummary();
      updateSummary();
    }

    function render() {
      document.getElementById('multiplierInput').value = multiplier;
      const buyInInput = document.getElementById('buyInAmountInput');
      if (buyInInput) buyInInput.value = buyInAmount;

      const container = document.getElementById('players');
      container.innerHTML = '';

      players.forEach((player, index) => {
        const div = document.createElement('div');
        div.className = 'player' + (player.active ? '' : ' inactive');

        const inputId = `input-${index}`;
        const profitId = `profit-${index}`;

        div.innerHTML = `
          <button class="remove-button" onclick="removePlayer(${index})">×</button>
          <p>
            <label>玩家名稱：</label>
            <input type="text" value="${player.name}" oninput="updateName(${index}, this.value)" placeholder="請輸入玩家名稱" />
            ${player.active ? '' : '<span class="tag">已退場</span>'}
          </p>
          <p>買入籌碼：${player.buyIn}</p>
          <p>代幣數量：${player.tokens}</p>
          <button onclick="buyIn(${index})" ${!player.active ? 'disabled' : ''}>買入 (${buyInAmount}籌碼 + 1代幣)</button>
          <button onclick="decreaseBuyIn(${index})" ${!player.active ? 'disabled' : ''}>減少 (${buyInAmount}籌碼 - 1代幣)</button>
          <button onclick="toggleActive(${index})">${player.active ? '標記退場' : '標記復出'}</button><br><br>
          <label>手動輸入剩餘籌碼：</label>
          <input id="${inputId}" type="text" value="${player.remainingInput}" oninput="updateRemaining(${index}, this.value)" ${!player.active ? 'disabled' : ''} />
          <p>盈虧：<span id="${profitId}">${formatProfit(player.profit)}</span></p>
        `;

        container.appendChild(div);
      });
    }

    function renderRoundSummary() {
      const tableBody = document.getElementById('roundsTable').getElementsByTagName('tbody')[0];
      tableBody.innerHTML = '';

      players.forEach(player => {
        const roundProfits = player.roundProfits.map(profit => formatProfit(profit)).join('');
        const totalProfit = Math.round(player.roundProfits.reduce((acc, profit) => acc + profit, 0));
        const row = tableBody.insertRow();
        row.innerHTML = `
          <td>${player.name}</td>
          <td>${roundProfits}</td>
          <td>${totalProfit}</td>
        `;
      });

      // 更新全體總盈虧
      updateGrandTotal();
    }

    // 計算全體總盈虧（歷史累計）
    function updateGrandTotal() {
      const grand = players.reduce((acc, p) => {
        const sumP = p.roundProfits.reduce((a, b) => a + b, 0);
        return acc + sumP;
      }, 0);
      const el = document.getElementById('grandTotalProfit');
      if (el) el.textContent = formatProfit(grand);
    }

    function updateSummary() {
      let totalBuyIn = 0;
      let totalRemaining = 0;

      players.forEach(player => {
        totalBuyIn += player.buyIn;
        totalRemaining += player.remaining;
      });

      document.getElementById('totalBuyIn').textContent = totalBuyIn;
      document.getElementById('totalRemaining').textContent = totalRemaining;
    }

    function saveToStorage() {
      localStorage.setItem('players', JSON.stringify(players));
      localStorage.setItem('rounds', JSON.stringify(rounds));
      localStorage.setItem('multiplier', multiplier);
      localStorage.setItem('buyInAmount', buyInAmount);
    }

    // 匯出 Excel：玩家名稱 + 歷史總盈虧
    function exportExcel() {
      if (typeof XLSX === 'undefined') {
        alert('XLSX 函式庫尚未載入，請檢查網路或 CDN。');
        return;
      }

      const headers = ["玩家名稱", "總盈虧"];

      const data = players.map(p => {
        const total = Math.round(
          p.roundProfits.reduce((a, b) => a + b, 0)
        );
        return [p.name || '', total];
      });

      const worksheetData = [headers, ...data];
      const worksheet = XLSX.utils.aoa_to_sheet(worksheetData);

      // 欄寬稍微調整好看一點
      worksheet['!cols'] = [
        { wch: 20 }, // 玩家名稱
        { wch: 10 }  // 總盈虧
      ];

      const workbook = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(workbook, worksheet, "總盈虧");

      XLSX.writeFile(workbook, "poker_total_profit.xlsx");
    }

    if (players.length === 0) addPlayer();
    render();
    renderRoundSummary();
    updateSummary();
  </script>
</body>
</html>
