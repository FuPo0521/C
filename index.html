<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>德州撲克籌碼追蹤器</title>
  <style>
  :root{
    --bg: #f6f8fb;
    --panel: #ffffff;
    --panel-soft: #f1f4f9;
    --card: #ffffff;
    --card-border: #e4e8f0;

    --text: #1e293b;
    --muted: #64748b;

    --accent: #3b82f6;
    --accent-soft: #e0edff;

    --success: #10b981;
    --success-soft: #e7f9f2;

    --warning: #f59e0b;
    --warning-soft: #fff4df;

    --danger: #ef4444;
    --danger-soft: #ffe8e8;

    --shadow: 0 10px 25px rgba(0,0,0,.06);
    --shadow-soft: 0 6px 18px rgba(0,0,0,.05);

    --radius: 16px;
    --radius-sm: 12px;

    --ui-scale: 1.06;
  }

  *{ box-sizing:border-box; }

  body{
    margin:0;
    font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Noto Sans TC", "Microsoft JhengHei", sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 30px 20px 50px;
    font-size: calc(16px * var(--ui-scale));
  }

  body > *{
    max-width: 1100px;
    margin-left:auto;
    margin-right:auto;
  }

  h1{
    margin-bottom:18px;
    font-size: calc(28px * var(--ui-scale));
    font-weight:700;
    letter-spacing:.5px;
  }

  .controls{
    background: var(--panel);
    border:1px solid var(--card-border);
    border-radius: var(--radius);
    padding:16px;
    display:flex;
    flex-wrap:wrap;
    gap:12px;
    align-items:center;
    box-shadow: var(--shadow-soft);
    margin-bottom:18px;
  }

  .controls label{
    display:flex;
    align-items:center;
    gap:8px;
    font-size: calc(15px * var(--ui-scale));
    color: var(--muted);
  }

  button{
    font-size: calc(15px * var(--ui-scale));
    padding: 11px 16px;
    border-radius: 12px;
    border:1px solid var(--card-border);
    background: var(--panel-soft);
    cursor:pointer;
    transition: all .15s ease;
    font-weight:600;
    box-shadow: 0 3px 8px rgba(0,0,0,.05);
  }

  button:hover{
    transform: translateY(-1px);
    background:#e9eef7;
  }

  button:disabled{
    opacity:.5;
    cursor:not-allowed;
    transform:none;
  }

  .player-container{
    display:grid;
    grid-template-columns: repeat(12, 1fr);
    gap:16px;
  }

  .player{
    grid-column: span 6;
    background: var(--card);
    border:1px solid var(--card-border);
    border-radius: var(--radius);
    padding:16px;
    box-shadow: var(--shadow);
    position:relative;
    transition: all .15s ease;
  }

  .player:hover{ transform: translateY(-3px); }
  .player.inactive{ opacity:.65; }

  .player p{
    margin:8px 0;
    color: var(--muted);
  }

  .player p:last-child{
    font-weight:700;
    color: var(--text);
  }

  .player button:nth-of-type(1){
    background: var(--success-soft);
    border-color:#c6f3e4;
  }
  .player button:nth-of-type(2){
    background: var(--warning-soft);
    border-color:#ffe1a6;
  }
  .player button:nth-of-type(3){
    background:#eef2f8;
  }

  .remove-button{
    position:absolute;
    top:6px;
    right:6px;
    width:22px;
    height:22px;
    border-radius:50%;
    background: var(--danger-soft);
    border:1px solid #ffcaca;
    font-size:12px;
    line-height:1;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:0;
    cursor:pointer;
  }

  .remove-button:hover{ background:#ffd6d6; }

  input[type="number"],
  input[type="text"]{
    font-size: calc(15px * var(--ui-scale));
    padding:10px 12px;
    border-radius: 10px;
    border:1px solid var(--card-border);
    background:white;
    outline:none;
    transition:.15s;
  }

  input:focus{
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-soft);
  }

  input[disabled]{ background:#f1f5f9; }

  .summary{
    background: var(--panel);
    border:1px solid var(--card-border);
    border-radius: var(--radius);
    padding:14px 16px;
    margin-top:16px;
    box-shadow: var(--shadow-soft);
    font-weight:600;
  }

  .round-summary{
    margin-top:20px;
    background: var(--panel);
    border:1px solid var(--card-border);
    border-radius: var(--radius);
    padding:16px;
    box-shadow: var(--shadow-soft);
  }

  .round-summary table{
    width:100%;
    border-collapse: collapse;
    margin-top:10px;
  }

  .round-summary th,
  .round-summary td{
    padding:12px;
    border:1px solid var(--card-border);
    font-size: calc(15px * var(--ui-scale));
    text-align:center;
  }

  .round-summary th{
    background:#f3f6fb;
    font-weight:700;
  }

  .round-summary tr:nth-child(even){ background:#fafcff; }

  #grandTotalProfit{
    display:inline-block;
    padding:4px 10px;
    border-radius:999px;
    background: var(--accent-soft);
    border:1px solid #cfe3ff;
  }

  .expense-summary{
    margin-top:16px;
    background: var(--panel);
    border:1px solid var(--card-border);
    border-radius: var(--radius);
    padding:16px;
    box-shadow: var(--shadow-soft);
  }

  .expense-summary h3{
    margin: 0 0 10px;
    font-size: calc(16px * var(--ui-scale));
  }

  .expense-summary table{
    width:100%;
    border-collapse: collapse;
    margin-top:10px;
  }

  .expense-summary th,
  .expense-summary td{
    padding:10px;
    border:1px solid var(--card-border);
    font-size: calc(14px * var(--ui-scale));
    text-align:center;
    vertical-align: middle;
  }

  .expense-summary th{
    background:#f3f6fb;
    font-weight:700;
  }

  .expense-summary tr:nth-child(even){ background:#fafcff; }

  .pill{
    display:inline-block;
    padding:3px 10px;
    border-radius:999px;
    background:#f1f4f9;
    border:1px solid var(--card-border);
    min-width: 70px;
    font-weight:700;
  }

  .expense-meta{
    margin-top:10px;
    color: var(--muted);
    font-weight:700;
    display:flex;
    flex-wrap:wrap;
    gap:12px;
    align-items:center;
  }

  .warn{
    color:#b45309;
    background:#fff4df;
    border:1px solid #ffe1a6;
    padding:6px 10px;
    border-radius: 999px;
    font-weight:800;
  }

  .tag{
    display:inline-block;
    margin-left:8px;
    padding:2px 6px;
    border:1px solid #bbb;
    border-radius:999px;
    font-size:12px;
    color:#555;
    background:#fff;
  }

  .roombar{
    margin-bottom: 18px;
    background: var(--panel);
    border:1px solid var(--card-border);
    border-radius: var(--radius);
    padding:14px 16px;
    box-shadow: var(--shadow-soft);
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    align-items:center;
  }
  .roombar strong{ margin-right:6px; }
  .roombar .status{
    margin-left:auto;
    color: var(--muted);
    font-weight:700;
  }
  .roombar input[type="text"]{ width: 220px; }

  @media (max-width: 980px){
    .player{ grid-column: span 12; }
    button{ width:100%; }
    .controls{ flex-direction:column; align-items:stretch; }
    .roombar{ flex-direction:column; align-items:stretch; }
    .roombar .status{ margin-left:0; }
    .roombar input[type="text"]{ width:100%; }
  }
  </style>

  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
</head>
<body>
  <h1>德州撲克 籌碼與盈虧計算</h1>

  <div class="roombar">
    <div>
      <strong>房間同步：</strong>
      <span id="roomLabel">未加入</span>
    </div>

    <input id="roomInput" type="text" placeholder="輸入房間代碼（例如 AB12CD）" autocomplete="off" />
    <button onclick="createRoom()">建立房間</button>
    <button onclick="joinRoom()">加入房間</button>
    <button onclick="leaveRoom()">離開房間</button>

    <div class="status" id="syncStatus">本地模式（localStorage）</div>
  </div>

  <div class="controls">
    <button onclick="addPlayer()">新增玩家</button>
    <button onclick="saveRound()">儲存回合</button>
    <label>籌碼倍率：
      <input type="number" id="multiplierInput" value="100" onchange="updateMultiplier(this.value)" />
    </label>
    <label>單次買入籌碼：
      <input type="number" id="buyInAmountInput" value="20000" onchange="updateBuyInAmount(this.value)" />
    </label>
    <button onclick="exportExcel()">匯出 Excel</button>
  </div>

  <div id="players" class="player-container"></div>

  <div class="summary">
    <p>總買入籌碼：<span id="totalBuyIn">0</span> | 總剩餘籌碼：<span id="totalRemaining">0</span></p>
  </div>

  <div class="round-summary">
    <h3>回合盈虧紀錄</h3>
    <table id="roundsTable">
      <thead>
        <tr>
          <th>玩家名稱</th>
          <th>回合盈虧</th>
          <th>總盈虧</th>
          <th>總買入次數</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
    <p style="margin-top:10px;font-weight:bold;">
      全體總盈虧（歷史累計）：<span id="grandTotalProfit">+0</span>
    </p>
  </div>

  <div class="expense-summary">
    <h3>金額計算</h3>
    <table id="expenseTable">
      <thead>
        <tr>
          <th>玩家</th>
          <th>餐費</th>
          <th>飲料</th>
          <th>代墊</th>
          <th>三欄合計</th>
          <th>總盈虧</th>
          <th>應收付</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>

    <div class="expense-meta">
      <div>餐費合計：<span id="sumDinner" class="pill">0</span></div>
      <div>飲料合計：<span id="sumDrink" class="pill">0</span></div>
      <div>代墊合計：<span id="sumOther" class="pill">0</span></div>
      <div>三欄總加總：<span id="sumAllExpense" class="pill">0</span></div>
      <div id="expenseWarn" class="warn" style="display:none;"></div>
    </div>
  </div>

  <div class="reset-button" style="margin-top:20px;">
    <button onclick="clearStorage()">清除儲存資料</button>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
    import {
      getFirestore,
      doc, setDoc, getDoc,
      collection, addDoc, deleteDoc, updateDoc,
      onSnapshot,
      serverTimestamp
    } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";

    // ========= 更硬策略設定 =========
    const HARD_LOCK_ENABLED = true;
    const HARD_LOCK_IDLE_MS = 1000; // ✅ 你要的延遲：停手多久才套用遠端更新/重繪

    const firebaseConfig = {
      apiKey: "AIzaSyCMz1-sVCCCJ1P0zIHRGj_l2FQ-W_XihSk",
      authDomain: "poker-9da33.firebaseapp.com",
      projectId: "poker-9da33",
      storageBucket: "poker-9da33.firebasestorage.app",
      messagingSenderId: "6507371258",
      appId: "1:6507371258:web:ac8ccdc7710117bd8ec743"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // ========= 本地狀態 =========
    window.players = JSON.parse(localStorage.getItem('players')) || [];
    window.rounds = JSON.parse(localStorage.getItem('rounds')) || [];
    window.multiplier = parseFloat(localStorage.getItem('multiplier')) || 100;
    window.buyInAmount = parseInt(localStorage.getItem('buyInAmount')) || 20000;

    // ========= 同步狀態 =========
    let currentRoomId = null;
    let unsubRoomDoc = null;
    let unsubPlayers = null;
    let unsubRounds = null;
    let applyingRemote = false;

    const playerWriteTimers = new Map();

    const roomLabelEl = document.getElementById('roomLabel');
    const syncStatusEl = document.getElementById('syncStatus');
    const roomInputEl = document.getElementById('roomInput');

    function setStatus(text){
      if (syncStatusEl) syncStatusEl.textContent = text;
      if (roomLabelEl) roomLabelEl.textContent = currentRoomId ? currentRoomId : '未加入';
    }

    function saveToStorage() {
      localStorage.setItem('players', JSON.stringify(players));
      localStorage.setItem('rounds', JSON.stringify(rounds));
      localStorage.setItem('multiplier', multiplier);
      localStorage.setItem('buyInAmount', buyInAmount);
    }

    function generateRoomId(){
      const chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
      let out = "";
      for(let i=0;i<6;i++) out += chars[Math.floor(Math.random()*chars.length)];
      return out;
    }

    function uid(){
      return "p_" + Math.random().toString(36).slice(2, 10) + Date.now().toString(36);
    }

    function roomRef(roomId){ return doc(db, "pokerRooms", roomId); }
    function playersCol(roomId){ return collection(db, "pokerRooms", roomId, "players"); }
    function playerRef(roomId, playerId){ return doc(db, "pokerRooms", roomId, "players", playerId); }
    function roundsCol(roomId){ return collection(db, "pokerRooms", roomId, "rounds"); }

    // ========= 硬鎖：輸入期間暫停重繪/套用遠端 =========
    let focusCount = 0;
    let idleTimer = null;

    // pending 佇列：輸入中收到的遠端更新先放這裡
    let pendingPlayers = null;
    let pendingRoomSettings = null;
    let pendingRounds = null;
    let pendingNeedsFullRender = false;

    function isLocked(){
      return HARD_LOCK_ENABLED && focusCount > 0;
    }

    function armIdleUnlock(){
      if (!HARD_LOCK_ENABLED) return;
      clearTimeout(idleTimer);
      idleTimer = setTimeout(() => {
        // 停手一段時間 → 嘗試解鎖並套用 pending
        if (focusCount > 0) {
          // 仍在 focus：不強制解鎖，但允許套用 pending「非破壞性」內容（這裡選擇不套用）
          // 讓輸入體驗最穩：等 blur 或下一次 idle
          setStatus(currentRoomId ? `輸入中（${currentRoomId}）` : '輸入中');
          return;
        }
        flushPending();
      }, HARD_LOCK_IDLE_MS);
    }

    window.__beginEdit = function(){
      focusCount += 1;
      armIdleUnlock();
      setStatus(currentRoomId ? `輸入中（${currentRoomId}）` : '輸入中');
    };

    window.__endEdit = function(){
      focusCount = Math.max(0, focusCount - 1);
      armIdleUnlock();
      if (focusCount === 0) flushPending();
    };

    window.__touchEdit = function(){
      // 每次輸入都延後 flush
      armIdleUnlock();
    };

    function flushPending(){
      if (!HARD_LOCK_ENABLED) return;

      if (pendingRoomSettings) {
        const { m, b } = pendingRoomSettings;
        pendingRoomSettings = null;

        applyingRemote = true;
        try{
          if (m && m !== multiplier) {
            multiplier = m;
            localStorage.setItem('multiplier', multiplier);
            document.getElementById('multiplierInput').value = multiplier;
          }
          if (b && b !== buyInAmount) {
            buyInAmount = b;
            localStorage.setItem('buyInAmount', buyInAmount);
            document.getElementById('buyInAmountInput').value = buyInAmount;
          }
        } finally {
          applyingRemote = false;
        }
      }

      if (pendingPlayers) {
        players = pendingPlayers;
        pendingPlayers = null;
        saveToStorage();
      }

      if (pendingRounds) {
        rounds = pendingRounds;
        pendingRounds = null;
        localStorage.setItem('rounds', JSON.stringify(rounds));
      }

      if (pendingNeedsFullRender) {
        pendingNeedsFullRender = false;
        fullRenderNow();
      } else {
        // 即便沒要求 full render，也至少更新 summary / grandTotal
        players.forEach((_, i) => updateProfit(i));
        updateSummary();
        updateGrandTotal();
        recalcExpenseSummary();
      }

      setStatus(currentRoomId ? `已同步（${currentRoomId}）` : '本地模式（localStorage）');
    }

    // ========= 資料修補 =========
    (function migrateLocal() {
      try {
        players = Array.isArray(players) ? players : [];
        rounds = Array.isArray(rounds) ? rounds : [];
        if (typeof multiplier !== 'number' || isNaN(multiplier)) multiplier = 100;
        if (typeof buyInAmount !== 'number' || isNaN(buyInAmount)) buyInAmount = 20000;
      } catch (e) {
        players = []; rounds = []; multiplier = 100; buyInAmount = 20000;
      }

      players = players.map(p => {
        const np = Object.assign({
          id: uid(),
          name: '',
          buyIn: buyInAmount,
          tokens: 1,
          remainingInput: '',
          remaining: 0,
          profit: 0,
          roundProfits: [],
          buyInCounts: [],
          active: true,
          expensesAutoSign: { dinner: 0, drink: 0, other: 0 }
        }, p);

        if (!np.id) np.id = uid();
        if (!Array.isArray(np.roundProfits)) np.roundProfits = [];
        if (!Array.isArray(np.buyInCounts)) np.buyInCounts = [];
        if (!np.expensesAutoSign || typeof np.expensesAutoSign !== 'object') {
          np.expensesAutoSign = { dinner: 0, drink: 0, other: 0 };
        }

        np.buyIn = Number(np.buyIn) || 0;
        np.tokens = Number(np.tokens) || 0;
        np.remaining = Number(np.remaining) || 0;
        np.profit = Number(np.profit) || 0;

        np.expensesAutoSign.dinner = Number(np.expensesAutoSign.dinner) || 0;
        np.expensesAutoSign.drink  = Number(np.expensesAutoSign.drink)  || 0;
        np.expensesAutoSign.other  = Number(np.expensesAutoSign.other)  || 0;

        return np;
      });

      saveToStorage();
    })();

    // ========= 同步：寫入 =========
    async function ensureRoomDoc(roomId){
      await setDoc(roomRef(roomId), {
        multiplier: Number(multiplier) || 100,
        buyInAmount: Number(buyInAmount) || 20000,
        updatedAt: serverTimestamp()
      }, { merge: true });
    }

    function scheduleWritePlayer(playerId, patch){
      if (!currentRoomId) return;
      if (applyingRemote) return;

      const key = playerId;
      const prev = playerWriteTimers.get(key);
      if (prev && prev.pending) Object.assign(prev.pending, patch);
      else playerWriteTimers.set(key, { timer: null, pending: Object.assign({}, patch) });

      const state = playerWriteTimers.get(key);
      clearTimeout(state.timer);

      state.timer = setTimeout(async () => {
        try{
          setStatus(`同步中…（${currentRoomId}）`);
          const toWrite = state.pending || {};
          state.pending = {};
          await updateDoc(playerRef(currentRoomId, playerId), Object.assign({}, toWrite, { updatedAt: serverTimestamp() }));
          setStatus(isLocked() ? `輸入中（${currentRoomId}）` : `已同步（${currentRoomId}）`);
        }catch(e){
          console.error(e);
          setStatus(`同步失敗（${currentRoomId}）`);
        }
      }, 250);
    }

    async function writeRoomSettingsNow(){
      if (!currentRoomId) return;
      if (applyingRemote) return;
      try{
        setStatus(`同步中…（${currentRoomId}）`);
        await updateDoc(roomRef(currentRoomId), {
          multiplier: Number(multiplier) || 100,
          buyInAmount: Number(buyInAmount) || 20000,
          updatedAt: serverTimestamp()
        });
        setStatus(isLocked() ? `輸入中（${currentRoomId}）` : `已同步（${currentRoomId}）`);
      }catch(e){
        console.error(e);
        setStatus(`同步失敗（${currentRoomId}）`);
      }
    }

    // ========= 同步：監聽（硬鎖版：輸入中只暫存，不重繪） =========
    function startListeners(roomId){
      if (unsubRoomDoc) unsubRoomDoc();
      if (unsubPlayers) unsubPlayers();
      if (unsubRounds) unsubRounds();

      unsubRoomDoc = onSnapshot(roomRef(roomId), (snap) => {
        if (!snap.exists()) return;
        const data = snap.data() || {};
        const m = Number(data.multiplier);
        const b = Number(data.buyInAmount);

        if (isLocked()) {
          pendingRoomSettings = { m, b };
          pendingNeedsFullRender = true;
          setStatus(`收到更新（待套用 ${roomId}）`);
          return;
        }

        applyingRemote = true;
        try{
          if (m && m !== multiplier) {
            multiplier = m;
            localStorage.setItem('multiplier', multiplier);
            document.getElementById('multiplierInput').value = multiplier;
          }
          if (b && b !== buyInAmount) {
            buyInAmount = b;
            localStorage.setItem('buyInAmount', buyInAmount);
            document.getElementById('buyInAmountInput').value = buyInAmount;
          }
        } finally {
          applyingRemote = false;
        }

        fullRenderNow();
        setStatus(`已同步（${roomId}）`);
      });

      unsubPlayers = onSnapshot(playersCol(roomId), (qs) => {
        const remotePlayers = [];
        qs.forEach((d) => {
          const p = d.data() || {};
          remotePlayers.push(Object.assign({
            id: d.id,
            name: '',
            buyIn: 0,
            tokens: 0,
            remainingInput: '',
            remaining: 0,
            profit: 0,
            roundProfits: [],
            buyInCounts: [],
            active: true,
            expensesAutoSign: { dinner: 0, drink: 0, other: 0 }
          }, p, { id: d.id }));
        });

        if (isLocked()) {
          pendingPlayers = remotePlayers;
          pendingNeedsFullRender = true;
          setStatus(`收到更新（待套用 ${roomId}）`);
          return;
        }

        applyingRemote = true;
        try{
          players = remotePlayers;
          saveToStorage();
        } finally {
          applyingRemote = false;
        }

        fullRenderNow();
        setStatus(`已同步（${roomId}）`);
      });

      unsubRounds = onSnapshot(roundsCol(roomId), (qs) => {
        const remoteRounds = [];
        qs.forEach((d) => remoteRounds.push(d.data() || {}));

        if (isLocked()) {
          pendingRounds = remoteRounds;
          pendingNeedsFullRender = true;
          setStatus(`收到更新（待套用 ${roomId}）`);
          return;
        }

        applyingRemote = true;
        try{
          rounds = remoteRounds;
          localStorage.setItem('rounds', JSON.stringify(rounds));
        } finally {
          applyingRemote = false;
        }

        renderRoundSummary();
        updateGrandTotal();
        setStatus(`已同步（${roomId}）`);
      });
    }

    // ========= 房間 =========
    window.createRoom = async function(){
      const roomId = generateRoomId();
      currentRoomId = roomId;
      setStatus(`建立房間中…（${roomId}）`);

      try{
        await ensureRoomDoc(roomId);

        for (const p of players) {
          if (!p.id) p.id = uid();
          await setDoc(playerRef(roomId, p.id), Object.assign({}, p, { updatedAt: serverTimestamp() }), { merge: true });
        }

        for (const r of rounds) {
          await addDoc(roundsCol(roomId), Object.assign({}, r, { createdAt: serverTimestamp() }));
        }

        const url = new URL(location.href);
        url.searchParams.set('room', roomId);
        history.replaceState(null, "", url.toString());

        startListeners(roomId);
        setStatus(`已同步（${roomId}）`);
      }catch(e){
        console.error(e);
        setStatus(`建立失敗（${roomId}）`);
      }
    };

    window.joinRoom = async function(){
      const roomId = String(roomInputEl.value || '').trim().toUpperCase();
      if (!roomId) {
        alert('請輸入房間代碼');
        return;
      }

      currentRoomId = roomId;
      setStatus(`加入房間中…（${roomId}）`);

      try{
        const snap = await getDoc(roomRef(roomId));
        if (!snap.exists()){
          await ensureRoomDoc(roomId);

          for (const p of players) {
            if (!p.id) p.id = uid();
            await setDoc(playerRef(roomId, p.id), Object.assign({}, p, { updatedAt: serverTimestamp() }), { merge: true });
          }

          for (const r of rounds) {
            await addDoc(roundsCol(roomId), Object.assign({}, r, { createdAt: serverTimestamp() }));
          }
        }

        const url = new URL(location.href);
        url.searchParams.set('room', roomId);
        history.replaceState(null, "", url.toString());

        startListeners(roomId);
        setStatus(`已同步（${roomId}）`);
      }catch(e){
        console.error(e);
        setStatus(`加入失敗（${roomId}）`);
      }
    };

    window.leaveRoom = function(){
      if (unsubRoomDoc) unsubRoomDoc();
      if (unsubPlayers) unsubPlayers();
      if (unsubRounds) unsubRounds();
      unsubRoomDoc = unsubPlayers = unsubRounds = null;
      currentRoomId = null;

      const url = new URL(location.href);
      url.searchParams.delete('room');
      history.replaceState(null, "", url.toString());

      setStatus('本地模式（localStorage）');
    };

    // ========= 核心計算 =========
    function formatProfit(profit) {
      if (profit === 0) return '+0';
      return profit > 0 ? `+${Math.round(profit)}` : `${Math.round(profit)}`;
    }

    function getTotalProfit(player) {
      return (player.roundProfits || []).reduce((a, b) => a + b, 0);
    }

    function formatSigned(n) {
      const v = Math.round(Number(n) || 0);
      if (v === 0) return '0';
      return v > 0 ? `+${v}` : `${v}`;
    }

    function updateProfit(index) {
      const p = players[index];
      const remaining = p.active ? p.remaining : 0;
      const buyIn = p.active ? p.buyIn : 0;
      p.profit = (remaining - buyIn) / multiplier;

      const profitElement = document.getElementById(`profit-${p.id}`);
      if (profitElement) profitElement.textContent = formatProfit(p.profit);
    }

    function updateSummary() {
      let totalBuyIn = 0;
      let totalRemaining = 0;

      players.forEach(player => {
        totalBuyIn += Number(player.buyIn) || 0;
        totalRemaining += Number(player.remaining) || 0;
      });

      document.getElementById('totalBuyIn').textContent = totalBuyIn;
      document.getElementById('totalRemaining').textContent = totalRemaining;
    }

    function updateGrandTotal() {
      const grand = players.reduce((acc, p) => acc + (p.roundProfits || []).reduce((a, b) => a + b, 0), 0);
      const el = document.getElementById('grandTotalProfit');
      if (el) el.textContent = formatProfit(grand);
    }

    // ========= 重繪（硬鎖時會被延後） =========
    function requestFullRender(){
      if (isLocked()) {
        pendingNeedsFullRender = true;
        setStatus(currentRoomId ? `輸入中（${currentRoomId}）` : '輸入中');
        return;
      }
      fullRenderNow();
    }

    function fullRenderNow(){
      // 計算
      players.forEach((_, i) => updateProfit(i));

      // UI
      renderPlayers();
      renderExpenseTable();
      renderRoundSummary();
      updateSummary();
      recalcExpenseSummary();
      updateGrandTotal();
    }

    // ========= 你的功能（注意：硬鎖期間避免 renderPlayers 破壞 input） =========
    window.updateMultiplier = function(value) {
      multiplier = parseFloat(value) || 100;
      localStorage.setItem('multiplier', multiplier);
      players.forEach((_, i) => updateProfit(i));
      recalcExpenseSummary();
      updateGrandTotal();
      updateSummary();
      writeRoomSettingsNow();
    };

    window.updateBuyInAmount = function(value) {
      buyInAmount = parseInt(value) || 0;
      localStorage.setItem('buyInAmount', buyInAmount);

      players.forEach((p, i) => {
        if (p.active) {
          p.buyIn = buyInAmount * (p.tokens || 0);
          updateProfit(i);
          if (currentRoomId) scheduleWritePlayer(p.id, { buyIn: p.buyIn });
        }
      });

      saveToStorage();
      requestFullRender();
      writeRoomSettingsNow();
    };

    window.addPlayer = async function() {
      const player = {
        id: uid(),
        name: '',
        buyIn: buyInAmount,
        tokens: 1,
        remainingInput: '',
        remaining: 0,
        profit: 0,
        roundProfits: [],
        buyInCounts: [],
        active: true,
        expensesAutoSign: { dinner: 0, drink: 0, other: 0 }
      };
      players.push(player);
      saveToStorage();
      requestFullRender();

      if (currentRoomId) {
        try{
          await setDoc(playerRef(currentRoomId, player.id), Object.assign({}, player, { updatedAt: serverTimestamp() }), { merge: true });
        }catch(e){ console.error(e); }
      }
    };

    window.removePlayer = async function(index) {
      const p = players[index];
      players.splice(index, 1);
      saveToStorage();
      requestFullRender();

      if (currentRoomId && p?.id) {
        try{ await deleteDoc(playerRef(currentRoomId, p.id)); }catch(e){ console.error(e); }
      }
    };

    window.buyIn = function(index) {
      const p = players[index];
      if (!p.active) return;
      p.buyIn += buyInAmount;
      p.tokens += 1;
      updateProfit(index);
      saveToStorage();

      // 這裡不要重繪 players（避免打字的人被影響），只更新 summary/profit/expense
      updateSummary();
      recalcExpenseSummary();
      updateGrandTotal();

      if (currentRoomId) scheduleWritePlayer(p.id, { buyIn: p.buyIn, tokens: p.tokens });
    };

    window.decreaseBuyIn = function(index) {
      const p = players[index];
      if (!p.active) return;
      if (p.buyIn >= buyInAmount && p.tokens > 0) {
        p.buyIn -= buyInAmount;
        p.tokens -= 1;
        updateProfit(index);
        saveToStorage();

        updateSummary();
        recalcExpenseSummary();
        updateGrandTotal();

        if (currentRoomId) scheduleWritePlayer(p.id, { buyIn: p.buyIn, tokens: p.tokens });
      }
    };

    window.updateRemaining = function(index, value) {
      const p = players[index];
      if (!p.active) return;

      p.remainingInput = value;
      const numericValue = parseInt(String(value).replace(/[^\d]/g, '')) || 0;
      p.remaining = numericValue;

      updateProfit(index);
      saveToStorage();

      updateSummary();
      recalcExpenseSummary();
      updateGrandTotal();

      if (currentRoomId) scheduleWritePlayer(p.id, { remainingInput: p.remainingInput, remaining: p.remaining, profit: p.profit });
    };

    window.updateName = function(index, value) {
      const p = players[index];
      p.name = value;
      saveToStorage();

      // 名字變更在硬鎖期間不重繪 players/expense/round 表格，避免抖動
      pendingNeedsFullRender = true;

      if (currentRoomId) scheduleWritePlayer(p.id, { name: p.name });
    };

    window.toggleActive = function(index) {
      const p = players[index];
      p.active = !p.active;

      if (!p.active) {
        p.buyIn = 0;
        p.tokens = 0;
        p.remainingInput = '';
        p.remaining = 0;
        p.profit = 0;
      } else {
        p.buyIn = buyInAmount;
        p.tokens = 1;
        p.remainingInput = '';
        p.remaining = 0;
        p.profit = 0;
      }

      saveToStorage();
      requestFullRender();

      if (currentRoomId) scheduleWritePlayer(p.id, {
        active: p.active,
        buyIn: p.buyIn,
        tokens: p.tokens,
        remainingInput: p.remainingInput,
        remaining: p.remaining,
        profit: p.profit
      });
    };

    window.saveRound = async function() {
      players.forEach((player) => {
        const roundProfit = player.active ? player.profit : 0;
        player.roundProfits.push(roundProfit);

        const roundBuyInCount = player.active ? (Number(player.tokens) || 0) : 0;
        if (!Array.isArray(player.buyInCounts)) player.buyInCounts = [];
        player.buyInCounts.push(roundBuyInCount);

        if (currentRoomId) {
          scheduleWritePlayer(player.id, {
            roundProfits: player.roundProfits,
            buyInCounts: player.buyInCounts
          });
        }
      });

      const roundData = players.map(player => ({
        playerId: player.id,
        name: player.name,
        roundProfits: player.roundProfits,
        buyInCounts: player.buyInCounts,
        totalProfit: (player.roundProfits || []).reduce((acc, profit) => acc + profit, 0),
        totalBuyInCount: (player.buyInCounts || []).reduce((acc, c) => acc + c, 0)
      }));

      rounds.push({ data: roundData, createdAt: Date.now() });
      saveToStorage();

      if (currentRoomId) {
        try{
          await addDoc(roundsCol(currentRoomId), Object.assign({}, { data: roundData }, { createdAt: serverTimestamp() }));
        }catch(e){ console.error(e); }
      }

      resetCurrentRound();
      requestFullRender();
    };

    function resetCurrentRound() {
      players.forEach(player => {
        if (player.active) {
          player.buyIn = buyInAmount;
          player.tokens = 1;
        } else {
          player.buyIn = 0;
          player.tokens = 0;
        }
        player.remainingInput = '';
        player.remaining = 0;
        player.profit = 0;

        if (currentRoomId) scheduleWritePlayer(player.id, {
          buyIn: player.buyIn,
          tokens: player.tokens,
          remainingInput: player.remainingInput,
          remaining: player.remaining,
          profit: player.profit
        });
      });

      saveToStorage();
    }

    window.clearStorage = function() {
      localStorage.clear();
      players = [];
      rounds = [];
      multiplier = 100;
      buyInAmount = 20000;
      document.getElementById('multiplierInput').value = multiplier;
      document.getElementById('buyInAmountInput').value = buyInAmount;
      addPlayer();
      requestFullRender();
    };

    function parseUnsignedInt(raw) {
      const digits = String(raw || '').replace(/[^\d]/g, '');
      return parseInt(digits || '0', 10);
    }

    window.updateExpenseAutoSign = function(index, field, value) {
      const p = players[index];
      if (!p.expensesAutoSign || typeof p.expensesAutoSign !== 'object') {
        p.expensesAutoSign = { dinner: 0, drink: 0, other: 0 };
      }
      const n = parseUnsignedInt(value);

      if (field === 'dinner' || field === 'drink') p.expensesAutoSign[field] = -n;
      else p.expensesAutoSign[field] = +n;

      saveToStorage();

      // 這裡也不要重繪表格（避免打字中被抖動），只重算結果
      recalcExpenseSummary();
      updateGrandTotal();

      if (currentRoomId) scheduleWritePlayer(p.id, { expensesAutoSign: p.expensesAutoSign });
    };

    // ========= UI render =========
    function renderPlayers() {
      document.getElementById('multiplierInput').value = multiplier;
      const buyInInput = document.getElementById('buyInAmountInput');
      if (buyInInput) buyInInput.value = buyInAmount;

      const container = document.getElementById('players');
      container.innerHTML = '';

      players.forEach((player, index) => {
        const div = document.createElement('div');
        div.className = 'player' + (player.active ? '' : ' inactive');

        const remainingInputId = `remaining-${player.id}`;
        const nameInputId = `name-${player.id}`;
        const profitId = `profit-${player.id}`;

        div.innerHTML = `
  <button class="remove-button" onclick="removePlayer(${index})">×</button>
  <p>
    <label>玩家${index + 1} 名稱：</label>
            <input
              id="${nameInputId}"
              type="text"
              value="${player.name || ''}"
              onfocus="__beginEdit()"
              onblur="__endEdit()"
              oninput="__touchEdit(); updateName(${index}, this.value)"
              placeholder="請輸入玩家名稱"
            />
            ${player.active ? '' : '<span class="tag">已退場</span>'}
          </p>
          <p>買入籌碼：${player.buyIn || 0}</p>
          <p>代幣數量：${player.tokens || 0}</p>
          <button onclick="buyIn(${index})" ${!player.active ? 'disabled' : ''}>買入 (${buyInAmount}籌碼 + 1代幣)</button>
          <button onclick="decreaseBuyIn(${index})" ${!player.active ? 'disabled' : ''}>減少 (${buyInAmount}籌碼 - 1代幣)</button>
          <button onclick="toggleActive(${index})">${player.active ? '標記退場' : '標記復出'}</button><br><br>
          <label>手動輸入剩餘籌碼：</label>
          <input
            id="${remainingInputId}"
            type="text"
            inputmode="numeric"
            pattern="[0-9]*"
            autocomplete="off"
            value="${player.remainingInput || ''}"
            onfocus="__beginEdit()"
            onblur="__endEdit()"
            oninput="__touchEdit(); updateRemaining(${index}, this.value)"
            ${!player.active ? 'disabled' : ''}
          />
          <p>盈虧：<span id="${profitId}">${formatProfit(player.profit || 0)}</span></p>
        `;

        container.appendChild(div);
      });
    }

    function renderRoundSummary() {
      const tableBody = document.getElementById('roundsTable').getElementsByTagName('tbody')[0];
      tableBody.innerHTML = '';

      players.forEach(player => {
        const totalProfit = Math.round((player.roundProfits || []).reduce((acc, profit) => acc + profit, 0));
        const totalBuyInCount = (player.buyInCounts || []).reduce((acc, c) => acc + c, 0);
        const roundProfitsShown = (player.roundProfits || []).map(p => formatProfit(p)).join(' / ');

        const row = tableBody.insertRow();
        row.innerHTML = `
          <td>${player.name || ''}</td>
          <td>${roundProfitsShown}</td>
          <td>${totalProfit}</td>
          <td>${totalBuyInCount}</td>
        `;
      });

      updateGrandTotal();
    }

    function renderExpenseTable() {
      const table = document.getElementById('expenseTable');
      if (!table) return;

      const tbody = table.getElementsByTagName('tbody')[0];
      tbody.innerHTML = '';

      players.forEach((p, i) => {
        const es = p.expensesAutoSign || { dinner: 0, drink: 0, other: 0 };
        const dinnerShown = Math.abs(Number(es.dinner) || 0);
        const drinkShown  = Math.abs(Number(es.drink)  || 0);
        const otherShown  = Math.abs(Number(es.other)  || 0);

        const row = tbody.insertRow();
        row.innerHTML = `
          <td>${p.name || ''}</td>
          <td>
            <input
              type="text"
              inputmode="numeric"
              pattern="[0-9]*"
              autocomplete="off"
              value="${dinnerShown ? dinnerShown : ''}"
              onfocus="__beginEdit()"
              onblur="__endEdit()"
              oninput="__touchEdit(); updateExpenseAutoSign(${i}, 'dinner', this.value)"
              placeholder="0"
            />
          </td>
          <td>
            <input
              type="text"
              inputmode="numeric"
              pattern="[0-9]*"
              autocomplete="off"
              value="${drinkShown ? drinkShown : ''}"
              onfocus="__beginEdit()"
              onblur="__endEdit()"
              oninput="__touchEdit(); updateExpenseAutoSign(${i}, 'drink', this.value)"
              placeholder="0"
            />
          </td>
          <td>
            <input
              type="text"
              inputmode="numeric"
              pattern="[0-9]*"
              autocomplete="off"
              value="${otherShown ? otherShown : ''}"
              onfocus="__beginEdit()"
              onblur="__endEdit()"
              oninput="__touchEdit(); updateExpenseAutoSign(${i}, 'other', this.value)"
              placeholder="0"
            />
          </td>
          <td><span class="pill" id="expSum-${i}">0</span></td>
          <td><span class="pill" id="totalProfit-${i}">0</span></td>
          <td><span class="pill" id="finalNet-${i}">+0</span></td>
        `;
      });
    }

    function recalcExpenseSummary() {
      let sumDinner = 0, sumDrink = 0, sumOther = 0;

      players.forEach((p, i) => {
        const es = p.expensesAutoSign || { dinner: 0, drink: 0, other: 0 };
        const dinner = Number(es.dinner) || 0;
        const drink  = Number(es.drink)  || 0;
        const other  = Number(es.other)  || 0;

        sumDinner += dinner;
        sumDrink  += drink;
        sumOther  += other;

        const expSum = dinner + drink + other;
        const totalProfit = getTotalProfit(p);
        const finalNet = totalProfit + expSum;

        const expSumEl = document.getElementById(`expSum-${i}`);
        const totalProfitEl = document.getElementById(`totalProfit-${i}`);
        const finalNetEl = document.getElementById(`finalNet-${i}`);

        if (expSumEl) expSumEl.textContent = formatSigned(expSum);
        if (totalProfitEl) totalProfitEl.textContent = formatSigned(totalProfit);
        if (finalNetEl) finalNetEl.textContent = formatProfit(finalNet);
      });

      const sumAll = sumDinner + sumDrink + sumOther;

      const elDinner = document.getElementById('sumDinner');
      const elDrink  = document.getElementById('sumDrink');
      const elOther  = document.getElementById('sumOther');
      const elAll    = document.getElementById('sumAllExpense');

      if (elDinner) elDinner.textContent = formatSigned(sumDinner);
      if (elDrink)  elDrink.textContent  = formatSigned(sumDrink);
      if (elOther)  elOther.textContent  = formatSigned(sumOther);
      if (elAll)    elAll.textContent    = formatSigned(sumAll);

      const warn = document.getElementById('expenseWarn');
      if (warn) {
        const diff = Math.round(sumAll);
        if (diff !== 0) {
          warn.style.display = 'inline-block';
          warn.textContent = `⚠ 代墊與消費未平衡：差額 ${formatSigned(diff)}（請檢查是否有人漏填）`;
        } else {
          warn.style.display = 'none';
          warn.textContent = '';
        }
      }
    }

    // ========= Excel =========
    window.exportExcel = function() {
      if (typeof XLSX === 'undefined') {
        alert('XLSX 函式庫尚未載入，請檢查網路或 CDN。');
        return;
      }

      const headers = ["玩家名稱", "總盈虧", "晚餐", "飲料", "代墊", "應收付"];

      const data = players.map(p => {
        const totalProfit = Math.round(getTotalProfit(p));
        const es = p.expensesAutoSign || { dinner: 0, drink: 0, other: 0 };

        const dinnerShown = Math.round(Math.abs(Number(es.dinner) || 0));
        const drinkShown  = Math.round(Math.abs(Number(es.drink)  || 0));
        const otherShown  = Math.round(Math.abs(Number(es.other)  || 0));

        const expSum = (Number(es.dinner)||0) + (Number(es.drink)||0) + (Number(es.other)||0);
        const finalNet = Math.round(totalProfit + expSum);

        return [p.name || '', totalProfit, dinnerShown, drinkShown, otherShown, finalNet];
      });

      const worksheetData = [headers, ...data];
      const worksheet = XLSX.utils.aoa_to_sheet(worksheetData);

      worksheet['!cols'] = [
        { wch: 18 }, { wch: 10 }, { wch: 10 }, { wch: 10 }, { wch: 10 }, { wch: 10 }
      ];

      const workbook = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(workbook, worksheet, "結算");
      XLSX.writeFile(workbook, "poker_settlement.xlsx");
    };

    // ========= 啟動 =========
    if (players.length === 0) await window.addPlayer();
    requestFullRender();

    // 若網址有 ?room=XXXX 自動加入
    (function autoJoinFromUrl(){
      const url = new URL(location.href);
      const roomId = (url.searchParams.get('room') || '').trim().toUpperCase();
      if (!roomId) {
        setStatus('本地模式（localStorage）');
        return;
      }
      roomInputEl.value = roomId;
      window.joinRoom();
    })();
  </script>
</body>
</html>
